<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background body -->
  <rect width="128" height="128" rx="22" fill="#0d7a70"/>

  <!-- Calculator face -->
  <rect x="16" y="10" width="96" height="108" rx="10" fill="#f0fcfb"/>

  <!-- Display screen -->
  <rect x="24" y="18" width="80" height="30" rx="6" fill="#07403c"/>
  <!-- Display value -->
  <text x="97" y="40" font-family="'Courier New',Courier,monospace" font-size="18" font-weight="bold" fill="#3ef5e0" text-anchor="end">88</text>

  <!-- Row 1: function keys (gray-teal) + operator (orange) -->
  <rect x="24" y="57" width="19" height="15" rx="4" fill="#8ecdc8"/>
  <rect x="47" y="57" width="19" height="15" rx="4" fill="#8ecdc8"/>
  <rect x="70" y="57" width="19" height="15" rx="4" fill="#8ecdc8"/>
  <rect x="93" y="57" width="15" height="15" rx="4" fill="#d07318"/>

  <!-- Row 2 -->
  <rect x="24" y="76" width="19" height="14" rx="4" fill="#c8ebe8"/>
  <rect x="47" y="76" width="19" height="14" rx="4" fill="#c8ebe8"/>
  <rect x="70" y="76" width="19" height="14" rx="4" fill="#c8ebe8"/>
  <rect x="93" y="76" width="15" height="14" rx="4" fill="#d07318"/>

  <!-- Row 3 -->
  <rect x="24" y="94" width="19" height="14" rx="4" fill="#c8ebe8"/>
  <rect x="47" y="94" width="19" height="14" rx="4" fill="#c8ebe8"/>
  <rect x="70" y="94" width="19" height="14" rx="4" fill="#c8ebe8"/>
  <rect x="93" y="94" width="15" height="14" rx="4" fill="#d07318"/>

  <!-- Row 4: wide 0 + dot + equals -->
  <rect x="24" y="112" width="42" height="6" rx="3" fill="#c8ebe8"/>
  <rect x="70" y="112" width="19" height="6" rx="3" fill="#c8ebe8"/>
  <rect x="93" y="112" width="15" height="6" rx="3" fill="#0f9e92"/>
</svg>
